body:
  text: 此二條出方丈臺昭靈李夫人口訣九月十二日夜喻之道日常以手按兩眉後小空中三過又以手心及指摩兩目下權上以手捉耳行三十過摩唯令數無時節也畢輒以手逆乘額三九過從眉中始乃上行入髮際中口傍咽液多少無數也如常行目日清明一年可夜書亦可於人中密為之勿語其狀眉後小空中為上元六合之府主化生眼暉和瑩精光長珠徹童保練目神是真人坐起之上道也一名曰真人常居內經真人唁曰子欲夜書當修常居矣真人所以能旁觀四逹八遐照朗者實常居之數明也目下權上是决明保室歸嬰至道以手捉耳行深明映之術也於是理關血散皺班不生目華玄映和精神盈矣夫人之將老鮮不先始於耳目也又老形也亦發始於目際之左右也以手乘額上內存赤子日月𩀱明上元歡憘三九始周數畢乃止此謂乎朝三元固𦠊堅髮之道也頭四面兩手乘之順髮就結惟令多也於是頭血流散風涇不凝也都畢以手按目四眥二九覺令見光分明是驗眼神之道久為之得見百靈石景子經曰常能以手掩口鼻臨目微氣久許時手中生液追以摩面目常行之使人體香太上三天關玉經曰常欲手按目近鼻之兩眥閉氣為之氣通輒止吐而後始常行之眼能洞觀右二條南嶽魏夫人所出丹字紫書三五順行經曰坐常欲閉目內視存見五藏腸胃久行之自得分明了了也太素丹景經曰一面之上常欲得兩手摩拭之使氣熱髙下隨形皆使極匝人面有光澤皺班不生行之五年色如少女所謂山川行氣常盈不沒丹景經曰先當摩拭兩手令熱然後以拭面目畢又順手摩髮如理櫛之狀兩臂亦更互以手摩之使髮不白脉不浮升大洞真經精景按摩篇曰卧起常平氣正坐先義兩手乃度以掩項後因仰面視上與項爭使項與兩手爭也為之三四止使人精和血通風氣不入能久行之不死不病畢又屈動身體申手四極反張側掣宣搖百關為之各三卧起先以手巾若厚帛拭項中四面及耳後使圎匝熱溫溫然也順髮摩頭若櫛理之無在也良久摩兩手以治面目久行之使人目明而邪氣不干形體不垢𦡸去穢也都畢而咽液三十過以導內液右一條出大洞精景經中西王母反胎按摩玉經養生之道以耳目為主雜視則目暗廣憂則耳閉此二病從身中來而結病非外客之假禍也所謂聞道之難也非聞道之難行道難也非行道之難而終道難矣若夫耳目亂想不遣艱難雖復足躡仙閣手攀龍軒猶無益也反胎按摩常以陽日用一日為陽二日為隂每陽日之旦陽日之夜夜卧覺旦將起急更閉目向本命之方以兩手掌先相摩切令小熱各左右試按兩目就耳門下令兩掌俱交㑹於項中九過又存兩目中各有紫赤黃三色雲氣各下入兩耳中良久隂呪曰眼童三雲兩目真君英明注精開通帝神太玄雲儀玉靈敷篇保利𩀱闕啓徹九門百節應響佪液泥丸身升玉宫列為上真呪畢因咽液三過既畢乃開目以為常陽日坐起常可行此不必旦暮也行之三年耳目聰明理髮常向本命既櫛髮之始而隂呪曰太帝散靈五老反神泥丸玄華保精長存左拘𨼆月右引日根六合清練百神受恩畢常行之使人頭腦不痛太極經曰理髮欲向玉池既櫛髮之始而微祝曰泥丸玄華保精長存左為𨼆月右為日根六合清練百神受恩畢祝咽液三過能常行之使髮不落而日生當數易櫛櫛之取多而不使痛亦可令侍者櫛取多也於是血液不滯髮根常堅右二條安九華所告令施用坐卧常欲鼻孔向本命飲食亦然若不得向本命常向東北及西北亦佳也此二處是天地魂魄之門津也又卧起常自左右搖動身體數十過畢又兩手據後面舉頭向天左右目搖動項中二十過畢平坐舉兩手托天良久畢又摩兩掌以自拭目傍至兩耳又良久畢隂呪曰前搏後指天帝上客左眄右顧長生大度仰頭喘息太一相極却月龍隁司命同軫飲食胎元交關崑崙回倒𩀱跽真人同志呪畢輒引氣閉之存臍中赤氣大如綖出臍外入鼻中如此三過按摩之道都畢使人百關通利長生不病紫度炎光內視中方曰常欲閉目而卧安身微氣使如卧狀令併人不覺也乃內視逺聽四方令我耳目注萬里之外久行之爾白見萬里之外事精心為之乃見百萬里外事也人耳中亦常聞金玉之音絲竹之聲此妙法也四方者總其言耳當先起一方而內法視聽𥘉為之實無髣佛久久誠自入妙大洞真經髙上內章遏邪大呪上法曰每當經危嶮之路鬼廟之間意中諸有疑難之處心將有微忌勑勑所經履者乃當先反舌內向咽液三過畢以左手第三指躡兩鼻孔下人中之本鼻中鬲孔之內際也三十六過即以手急按勿舉指計數也鼻中鬲之際名曰山源山源者一名鬼井一名神池一名邪根一名魂臺也躡畢因叩齒七通畢又進手心以掩鼻於是臨目乃微祝曰朱鳥陵天神威內張山源四填鬼井逃亡神池吐氣邪根伏藏魂臺四明瓊房玲琅玉真巍峩在鎮明堂手暉紫霞頭建晨光執詠洞經三十九章中有辟邪龍虎截兵斬缸猛狩奔牛御刀吞鑲揭山玃天神雀毒龍六領吐火啖鬼之王電猪雷父掣星流橫梟磕駿灼逆風橫行大禽羅察皆在我傍吐火萬丈以除不祥群精啓道封落山鄉千神百靈併手叩顙澤尉捧燈為我燒香所在所經萬神奉迎畢又叩齒三通乃開目徐去左手也手按山源則鬼并閉門手摶神池則邪根散分手按卧魂臺則玉真守闕於是感激靈根天獸來衛千精震伏莫干我氣此自然之理使忽爾而然也鼻下山源是一身疪津真邪之通府不真者所以生邪氣為真者所以遏萬邪在我運攝之耳故吉凶兆焉明堂中亦一身之文也死生之形府七魄元室三魂靈宅存其神可以眇乎內觀廢其道所以致乎杇爛故由我御慎順其衛生而無悔咎定焉右四條出大洞真經髙上首章大靈真人曰風病之所生生於丘墳隂濕三泉壅滯是故地宫以水氣相激多作風痺風痺之重者舉體不援輕者半身或失手足也若常夢在東北及西北經按故居或身見靈床處所者正欲與冢氣相接耳墓之東北為徴絶命西北為九厄此皆冢訟之凶地若夢見亡者於其間益見驗也若每遇此夢者卧覺當正向上三啄齒而祝之曰太元上玄九都紫天理魂護命髙素真人我受上法受教太玄長生久視身飛體仙冡墓永安鬼訟塞間魂魄和恱惡氣不烟遊魅魍魎敢千我神北帝折制收氣入淵得籙上皇名書帝前如此者再祝又叩齒三通則不復夢冡墓及家死鬼也此北帝祕呪也有心好事者皆可行之若經常得惡夢不祥者皆可按此法於是鬼氣滅也邪魅散形也手臂不援者沈風毒氣在脉中結附痺骨使之然耳自宜針炙針炙則愈又宜按北帝曲折之祝若行之百過疾立消除也先以一手徐徐按摩疾處良久畢乃卧目內視咽液三過叩齒三通正心微呪曰太上四玄五華六庭三魂七魄天關地精神府榮衛天胎上明四支百神九節萬靈受籙玉晨刋書玉城玉女侍身玉童護命永齊二景飛仙上清長與日月年俱受傾超騰升仙得整太平流風結痾注鬼五龍魍魎冡氣隂氣相回陵我四支干我盛衰太上天丁龍虎矅威斬鬼不祥風邪即摧考注匿訟百毒𨼆非使我復常日月同暉考注見犯北鬼收摧如干明上威章付魁太上銘渟散華經上按摩法常以生氣時咽液二七過畢按體所痛處向王祝曰左玄右玄三神合真左黃右黃六華相當風氣惡疾伏匿四方玉液流澤上下宣通內遣水火外辟不祥長生神仙身常休強畢又咽液二七過常如此則無疾又當急按所痛處三十一過也右一條十月二十二日滄浪雲林宫右英王夫人所出消魔上靈經曰若體中不寧當反舌塞喉漱津咽液無數須㬰不寧之痾自即除也當時亦常覺體中寬軟也右一條出消魔上靈叙中夢𥧌不真魄協邪氣如校其心欲伺我神之間伏也每遇惡夢但向北啓太上大道君具言其狀不過四五則自消絶也右青童口訣日夜遇惡夢非好覺當即反枕更枕而祝曰太和玉女侍真衛魂六宫金童來衛生門化惡反善上書三元使我長生乘景駕雲畢咽液九過叩齒七通而卧如此四五亦自都絶消此呪亦反惡夢而為吉祥也右十一月十三日夜右英夫人所出天玄象靈樞逹觀所適冲心秀虛浪神味摽咀吸太和體氣蕭寥於是瓊振奏響萬籟冥招矣夫氣者神明之器匠清濁之宗囦處玄則天清在人則身存夫生無𧇊盈蓋順乎攝御之間也欲服六氣常以向曉向寅丑之際因以天時造始必以方面此之時也太霞剖暉丹陽誕光靈景啓晨朱精發明之始也先存日如雞子在泥丸中畢乃吐出一氣存氣為黑色名之尸氣也次吐二氣存氣為白色名之為故氣吐三氣存氣為蒼色名之為死氣也思以其色吐氣良久也凡出三色合吐六氣也畢又徐徐納引取黃氣四過存氣從泥丸日中來下四過畢輒咽液三過為之三畢乃又存在泥丸中下從耳中出當我口前令去面九寸臨目髣佛如見之復乘日納引取赤氣七過七過畢復咽液三過止乃起坐動搖四支俯仰屈伸令關脉調暢都畢也存咽液皆令青色夜亦可存月在泥丸中如存日法如存月當以月一日夜半至十五日住從十六日至三十日是月氣衰損天胎𧇊縮不可以夜存月也此法至妙能行之者仙所以吐納胎元漱吸明真時呼召五咽以得自然魂還絶宅魄歸泥丸所以長生也豈同採幽谷之隂氣求奔馬之靈神步海以求濟策毛車於火山哉可不慎歟可不慎歟右西王母叙訣乙丑嵗興寧三年七月四日夜司命東卿君來降侍從七人入户其人執華幡一名十絶靈幡一人帶鐶章囊其三人捧白牙箱箱中似有書也其一人握流金火鈴侍人並朱衣司命君形甚少於二弟著青錦繡裙紫毛帔中芙蓉冠二苐並同來侍立命座乃坐耳言語良久七月六日夜司命君又降喻書曰若必𥰳玄秉象清靖罕時遂拔群幽藻戢翼髙栖感味上契淵渟嶽峙蕭寥玉篇玩寶神生遺放俗戀調彈清靈澄景虛中五道發明色絶化浪欲與淡并空同冥衢無視無聽爾乃逺齊妙真重起玄覺明德內圎靈摽外定矣終能策雲軿以赴霄書司命之丹籙耳若情散萬念為生不固氣隨塵波心不真舍適足勞身神於林岫實有誤於來學也其道微而易尋其道艱而難得乎月五日夜半存日象在心中日從口入也使照一心之內與日共光相合㑹畢當覺心暖霞暉映驗良久乃祝曰太明育精內鍊丹心光暉合映神真來身畢咽液九過到十五日二十五日二十九日復作如上使人開明聽察百關解徹面生玉光體有金液行之五年太一遣保車來迎上登太霄行之惟欲數不必此數日作也右一條出消魔經中南嶽赤君內法又曰臨食上勿道死事勿露食物來衆邪氣又曰數澡浴要至甲子當沐不爾當以幾月日旦使人通靈浴不患數患人不能耳蕩錬尸臭而真氣來入右玄師魏夫人所勑使施用太上九變十化昜新經曰若履掩穢及者不盛處當先澡浴與解形以除之其法用竹葉十兩桃皮削取白四兩以清水一斛二斗於釡中煮之未及沸出適寒溫以浴形即萬淹除也既以除淹又辟濕痺瘡癢之疾且竹虛素而內白桃即却邪而折穢故用此二物以消形中之滓濁也天人下遊既反未嘗不用此水以蕩也至於世間符水祝漱外舍之近術皆莫比於此方也若浴者益佳但不用此水以沐耳鍊尸之素漿正宜以浴耳真竒祕也右玄壟羽官紫微王夫人勑令用之開日旦向王朱書再拜服之祝曰五神開心徹聽絶音三魂攝精盡守丹心使我勿忘五藏逺尋先拜拜畢祝祝畢乃服符服畢咽液五過叩齒五通勿令人見若不用開日以月旦月十五日二十七日一月三服一年使驗至祕符也太虛真人口訣以春乙卯日夏丙午日秋庚申日冬壬子日冥卧時先搗朱砂雄黃雌黃三分物細搗之以綿裏之使如棗大臨卧時以塞兩耳中此銷三尸錬七魄之妙道祕法也勿令人知者明日日中時以東流水沐浴沐浴畢更整飾床席易著衣服浣故者更弊履澡洗之都畢又掃灑於寢床下通令所住一室净潔更安枕卧向上閉氣握固良久而微祝曰天道有常改易故新上帝吉日沐浴為真三氣消尸朱黃安魂寶鍊七魄與我相親祝畢此道是消煉尸穢之上法改易新形之要訣也四時唯各取一日為之太虛真人曰先師見教以五逹之日日出三四丈許正立向日存三魂神正與日光俱入心平正內徹中良久閉氣三息咽液三過微祝曰太陽散暉垂光紫青來入我身照我五形所却鬼試心使平正內撤九氣外通胎命飛仙上清玉籙巳定呪畢以手拭目二七叩齒二七都畢此法使人三魂凝明丹心方正萬邪藏伏心試不行真要道也子常行之諸以五逹日向日趣令嚏也若不得嚏者以軟物向日引導鼻中亦即嚏也嚏即呪曰天光來進六胎上通三魂守神七魄不亡承日鳴嚏與日同形飛仙玉清位為真公祝畢拭目二七是內精上交日光三魂發明於內使人心開神解百精流傳於內府也若非五逹日者可不須爾也以五逹之日北向五再拜正心呼上真皇君皇君夫人名字三過畢叩齒五通畢解巾長跪謹啓五星日月上皇髙真道君三十二天帝玉清太上上清上皇上帝大道聖君几前因自陳七祖父母以下及一身千罪萬過上世以來乞得解脫三官告下天帝使罪名離釋削除黑簡乞賜得五星之真俱奔華晨上登上清交行玉門正月六日中時二月一日晡時三月七日夜半四月九日食時五月十五夜半六月三日中時七月七日夜半八月四日中時九月二日平旦十月一日平旦十一月六日夜半十二月二日夜半右記五逹吉日也服日月精法月朔旦日出髙二丈許遙望見日便握固禹步東向三步以口逆到取日精二七合食咽十四日可將二人入溫病家他病終不能著所將從人輕常卧之令老夀月生三日月出於庚上兩手握固西南行向月禹步三步以口遙飲月精二七十四咽之終年無疾病亦可入死家日月照瑕穢此二條食日飲月精皆消除萬疾洞真西王母寶神起居經
