front:
  text: 洞真西王母寶神起居經右九夜卧覺旦將起常更又急閉兩目叩齒九通咽液三過畢反舌向喉中乃搖頭動項七過以手按鼻孔邉左右上下數十過畢微祝曰九天上帝三元保嬰太上運華玉室發精七門召神九房受明耳聰目徹通真逹靈天中之嶽和氣調平驕女雲儀眼童英明玄窗朗朗百軒零零保和上元徘徊金庭五臟曜華耳目常生神臺鬱峙柱梁不傾七魄澡練三魂黃寧太上𢹂手與我共并五老混合無英輔營萬凶消滅所願必成日月守門心佪景星仙皇所告萬神敬聽卧覺輒按祝常如此勿忘也真道雖成故常行焉此太上西王母寶神起居玉經上法也令人耳目聰明强識豁朗鼻中調平不生洟穢四卿八徹面有童顔制魂録魄郤辟萬魔此是真人起居之妙道也所以名之為起居者起居常當行之又以兩手摩拭面目令小熱以為常每欲數之也阿母云人之將老面皺先從兩目下始又人之體衰氣少者先從兩鼻間也謂此二處是皺衰之户牖氣力之關津故起居常行此法以辟皺衰而氣力常保康和也西王母寶生無死玉經元死玉經曰手披華庭側遷延和天真上入神澗房玉谷填天山內源玄靈見萬魔自滅身長生永無死玉籍反帝君由兆和天真按此幽山源天真在兩眉間眉內之兩角也天真在一分下耳是引靈之上房也山源在鼻下人中之上本側在鼻下小入孔谷中也是塞滅萬魔之門户也華庭在兩眉之下對眉下之中央是徹視之津梁也旦將起暮將卧更急閉兩目以舌反向喉中咽液三過急以手按此三處各九過隂按之勿舉手也以為常令人長生無死降靈徹視塞滅萬鬼之道手按既畢微呪曰太上虛皇開散玉庭金房煌朗翠臺鬱青我攝三道滅鬼生靈我能無死亦能無生長生自在回老反嬰魂魄受練五神安寧回飈車輪北謁玉清上升太無與日合并遂為真人帝君合冥三元所告萬神敬聽昔楚莊公時巿長宋原甫者有善心常自掃除一巿中久時乃有一乞食人入市經年旦乞髙歌歌辭曰天庭生金華內源障隂邪玉谷參玄卿瓊氣互扶羅天真立日上飛蘂吐靈砂清晨按天馬佪駕神玄家仙人來入室又以滅百魔臨去又題市門如此楚一巿人無解而原甫意中志悟疑是仙人但不解其歌㫖耳遂乃叩頭咨請久久不巳乞人告曰吾實真人也此言是崑崙西王母寶生無死之曲知者使人不死遂授原甫要法施行密訣積二十年原用白日升天今在玄洲位為仙卿楚市乞人是南嶽真人赤松子矣時分形散景假適塵濁游眺囂穢招迎真㑹也清虛真人裴君說神寶經求道要先令自清耳聰為事主也且耳目是尋真之梯級綜靈之門户得失繫之而立存亡須之而辦也今抄經相示可施用也消魔上篇曰耳欲得數按抑其左右亦令旡數所謂營治城郭名書帝籍鼻亦欲數按其左右惟令數耳所謂灌溉中嶽名書帝籙
